<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="avatar-circle">
                <img src="https://ui-avatars.com/api/?name=Xuxemon&background=random" alt="Avatar" class="avatar-img">
            </div>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-item" routerLink="/home">INICIO</a>
            <a class="nav-item" routerLink="/xuxedex">XUXEDEX</a>
            <a class="nav-item active">MOCHILA</a>
            <a class="nav-item" routerLink="/perfil">
                <span class="icon-user"></span> PERFIL
            </a>
        </nav>

    </aside>

    <main class="main-content">
        <h1 class="page-title">Mochila</h1>

        <div class="mochila-grid">
            @for (slot of slots; track $index) {
            <div class="slot" [class.occupied]="slot">
                @if (slot) {
                <div class="item-container">
                    <img [src]="slot.imagen" [alt]="slot.nombre" class="item-image">
                    @if (slot.cantidad > 1 || slot.stackable) {
                    <span class="quantity">{{ slot.cantidad }}</span>
                    }
                </div>
                }
            </div>
            }
        </div>

        @if (isAdmin) {
        <div class="admin-panel">
            <h2 class="admin-title">Gestión de Jugadores (Admin)</h2>
            <div class="admin-controls">
                <div class="control-group">
                    <label>Jugador:</label>
                    <select (change)="onPlayerSelected($event)" class="admin-select">
                        <option value="">Selecciona un jugador</option>
                        @for (player of players; track player.id) {
                        <option [value]="player.id">{{ player.name }} ({{ player.player_id }})</option>
                        }
                    </select>
                </div>

                <div class="control-group">
                    <label>Xuxe:</label>
                    <select (change)="onXuxeSelected($event)" class="admin-select">
                        @for (tipo of tiposXuxe; track tipo.nombre) {
                        <option [value]="tipo.nombre">{{ tipo.nombre }}</option>
                        }
                    </select>
                </div>

                <div class="control-group">
                    <label>Cantidad:</label>
                    <input type="number" [value]="xuxeToAdd.cantidad" (input)="onCantidadChange($event)" min="1"
                        class="admin-input">
                </div>

                <button class="btn-admin" (click)="addXuxesToPlayer()">Añadir Xuxes</button>
            </div>
        </div>
        }
    </main>
</div>
