<div class="perfil-card">
  <div class="perfil-header">
    <div class="avatar-placeholder"></div>
    <h2>Mi Perfil</h2>
  </div>

  <form (ngSubmit)="saveProfile()" class="perfil-form">
    <div class="input-group">
      <input type="text" [value]="user.player_id" disabled placeholder="ID de Jugador (No editable)">
    </div>

    <div class="input-group">
      <input type="text" [(ngModel)]="user.name" name="name" placeholder="Nombre">
    </div>

    <div class="input-group">
      <input type="text" [(ngModel)]="user.surname" name="surname" placeholder="Apellidos">
    </div>

    <div class="input-group">
      <input type="email" [(ngModel)]="user.email" name="email" placeholder="Correo electrónico">
    </div>

    <button type="submit" class="btn-primary">Guardar Cambios</button>
  </form>

  <div class="danger-zone">
    <p>¿Quieres dejar de ser entrenador?</p>
    <button (click)="confirmDeactivate()" class="btn-danger">Darme de baja</button>
  </div>
</div>
