<div class="admin-container">
  <h2>Panel de Administración (Nivel 2)</h2>
  
  <div class="admin-section">
    <h3>Regalar Xuxemon Aleatorio a un Jugador</h3>
    <select #userSelect class="form-select">
      <option value="">-- Selecciona un jugador --</option>
      <option *ngFor="let user of users" [value]="user.id">
        {{ user.name }} (ID: {{ user.id }})
      </option>
    </select>
    
    <button (click)="darXuxemonAleatorio(userSelect.value)" class="btn-random">
      🎁 Dar Xuxemon Aleatorio
    </button>
  </div>
  
  <div class="admin-section" style="margin-top: 20px;">
    <h3>Regalar Xuxes a un Jugador</h3>
    <div class="admin-controls" style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
        <div class="control-group">
            <label style="font-weight: bold; margin-right: 5px;">Jugador:</label>
            <select (change)="onPlayerSelected($event)" class="form-select">
                <option value="">Selecciona un jugador</option>
                <option *ngFor="let user of users" [value]="user.id">
                  {{ user.name }} (ID: {{ user.id }})
                </option>
            </select>
        </div>

        <div class="control-group">
            <label style="font-weight: bold; margin-right: 5px;">Xuxe:</label>
            <select (change)="onXuxeSelected($event)" class="form-select">
                <option *ngFor="let tipo of tiposXuxe" [value]="tipo.nombre">{{ tipo.nombre }}</option>
            </select>
        </div>

        <div class="control-group">
            <label style="font-weight: bold; margin-right: 5px;">Cant:</label>
            <input type="number" [value]="xuxeToAdd.cantidad" (input)="onCantidadChange($event)" min="1"
                class="form-select" style="width: 80px;">
        </div>

        <button class="btn-random" (click)="addXuxesToPlayer()">
            🍬 Añadir Xuxes
        </button>
    </div>
  </div>
</div>
