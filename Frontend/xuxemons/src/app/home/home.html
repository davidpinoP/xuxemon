<div class="dashboard-layout">

  <aside class="sidebar">
    <div class="logo-container">
      <img src="/imagenes/avatar.png" alt="Logo de Xuxemons" class="logo-mini">
    </div>

    <nav aria-label="Navegación principal">
      <ul class="nav-list">
        <li><a routerLink="/home" class="nav-link active" aria-current="page">INICIO</a></li>
        <li><a routerLink="/xuxedex" class="nav-link">XUXEDEX</a></li>
        <li><a routerLink="/mochila" class="nav-link">MOCHILA</a></li>
        <li><a routerLink="/perfil" class="nav-link">PERFIL</a></li>
      </ul>
    </nav>
  </aside>

  <main class="main-content">

    <header class="home-header">
      <div class="greeting">
        <h1>Hola, entrenador</h1>
      </div>
      <div class="stats-badge" aria-label="Estadísticas del jugador">
        <span class="stat"><strong>Nivel:</strong> 1</span>
        <span class="stat"><strong>Monedas:</strong> 1500</span>
      </div>
    </header>

    <section class="team-section" aria-labelledby="team-heading">
      <h2 id="team-heading">Mi Equipo Principal</h2>

      <div class="team-grid">

        <article class="xuxemon-card" tabindex="0">
          <img src="/imagenes/assets/1.png" alt="Xuxemon Loro" class="xuxemon-img">
          <h3>Loro</h3>
        </article>

        <article class="xuxemon-card" tabindex="0">
          <img src="/imagenes/assets/2.png" alt="Xuxemon Tortuga" class="xuxemon-img">
          <h3>Tortuga</h3>
        </article>

        <article class="xuxemon-card" tabindex="0">
          <img src="/imagenes/assets/3.png" alt="Xuxemon Ballena" class="xuxemon-img">
          <h3>Ballena</h3>
        </article>

        <article class="xuxemon-card" tabindex="0">
          <img src="/imagenes/assets/4.png" alt="Xuxemon Caracol" class="xuxemon-img">
          <h3>Caracol</h3>
        </article>

      </div>
    </section>

  </main>
</div>
