<div class="registro-container">

    <div class="logo-container">
        <img src="/assets/images/xuxemon-mascot.png" alt="Xuxemon" class="mascot-logo">
    </div>

    <form [formGroup]="FormularioRegistro" (ngSubmit)="Submit()">

        <input type="text" formControlName="nombre" placeholder="Nombre">

        <input type="email" formControlName="correo" placeholder="Correo">

        <input type="password" formControlName="password" placeholder="Contraseña">

        <input type="password" formControlName="confirmar_password" placeholder="Contraseña">

        <button type="submit" [disabled]="FormularioRegistro.invalid">Registrarse</button>

    </form>

    <a routerLink="/login" class="login-link">¿Ya tienes cuenta? Inicia sesión</a>

</div>
